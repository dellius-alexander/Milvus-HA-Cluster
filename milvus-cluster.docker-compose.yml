      - nginx_data:/etc/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://milvus_nginx:8001/healthz", " | echo $$(grep -q 'ok' )"]
      interval: 60s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    restart: always
    networks:
      - etcd_network
      - minio_network
      - milvus_network
      - external_network

  ####################################################################
  # Prometheus service for monitoring (optional but recommended)
  prometheus:
    # Use a custom Dockerfile for Prometheus to ensure optimized configuration
    build:
      context: .
      dockerfile: .devcontainer/prometheus.Dockerfile
    # Container name for easy identification
    container_name: milvus_prometheus
    # Prometheus environment variables
    environment:
      # Log level for Prometheus (info for production, debug for troubleshooting)
      PROMETHEUS_LOG_LEVEL: info
    # Mount custom Prometheus configuration
    volumes:
      - prometheus_data:/prometheus
    # Expose Prometheus port
    ports:
      - "9090:9090"
    # Restart policy
    restart: always
    networks:
      - milvus_network

  ####################################################################
  # Grafana service for visualization
  grafana:
    image: grafana/grafana:10.4.0
    container_name: milvus_grafana
    environment:
      # Admin user for Grafana web interface
      GF_SECURITY_ADMIN_USER: admin
      # Admin password for Grafana (replace with a strong, unique password in production)
      GF_SECURITY_ADMIN_PASSWORD: "WW91ckdyYWZhbmFTdHJvbmdQYXNzd29yZDEyMw"
      # Log level for Grafana (info for production, debug for troubleshooting)
      GF_LOG_LEVEL: info
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always
    networks:
      - milvus_network

  ####################################################################
  # Node exporter for host metrics
  node_exporter:
    image: prom/node-exporter:v1.8.0
    container_name: milvus_node_exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    restart: always
    networks:
      - milvus_network

####################################################################
# Define persistent volumes for data durability
volumes:
  etcd0_data:
    name: milvus_etcd0_data
  etcd1_data:
    name: milvus_etcd1_data
  etcd2_data:
    name: milvus_etcd2_data
  nginx_data:
    name: milvus_nginx_data
  minio0_data:
    name: milvus_minio0_data
  minio1_data:
    name: milvus_minio1_data
  minio2_data:
    name: milvus_minio2_data
  minio3_data:
    name: milvus_minio3_data
  milvus_data:
    name: milvus_milvus_data
  milvus_logs:
    name: milvus_milvus_logs
  prometheus_data:
    name: milvus_prometheus_data
  grafana_data:
    name: milvus_grafana_data
  pulsar_data:
    name: milvus_pulsar_data

####################################################################
# Define internal network for secure communication
networks:
  etcd_network:
    driver: bridge
    ipam:
      driver: default
  minio_network:
    driver: bridge
    ipam:
      driver: default
  milvus_network:
    driver: bridge
    ipam:
      driver: default
  external_network:
    driver: bridge
    ipam:
      driver: default
