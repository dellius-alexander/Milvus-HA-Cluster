#####################################################################
  # MinIO service (node 1) for object storage
  minio0:
    build:
      context: .
      dockerfile: .devcontainer/minio.Dockerfile
    container_name: milvus_minio0
    environment:
    # Root user for MinIO administration
      MINIO_ROOT_USER: admin
      # Root password for MinIO (replace with a strong, unique password in production)
      MINIO_ROOT_PASSWORD: "WW91ckdyYWZhbmFTdHJvbmdQYXNzd29yZDEyMw"
      # Enable erasure coding for data redundancy
      MINIO_ERASURE_CODING: true
      # Address for MinIO console (web interface)
      MINIO_CONSOLE_ADDRESS: ":9001"
    ports:
      - "9001:9001"     # used for connecting to the console
    volumes:
      - minio0_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: always
    networks:
      - minio_network

