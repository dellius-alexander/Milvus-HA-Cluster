#####################################################################
# Define services for a distributed Milvus cluster, etcd, MinIO, and
# monitoring
services:
  # etcd service (replica 1) for distributed coordination
  etcd0:
    build:
      context: .
      dockerfile: .devcontainer/etcd.Dockerfile
    container_name: milvus_etcd0
    environment:
      - ETCD_NAME=etcd0
      - ETCD_INITIAL_CLUSTER=etcd0=http://etcd0:2380,etcd1=http://etcd1:2380,etcd2=http://etcd2:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd0:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd0:2380
    volumes:
      - etcd0_data:/etcd_data
    healthcheck:
      test: [ "CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    depends_on:
      nginx:
        condition: service_started
    restart: always
    networks:
      - etcd_network

  # etcd replica 2
  etcd1:
    build:
      context: .
      dockerfile: .devcontainer/etcd.Dockerfile
    container_name: milvus_etcd1
    environment:
      - ETCD_NAME=etcd1
      - ETCD_INITIAL_CLUSTER=etcd0=http://etcd0:2380,etcd1=http://etcd1:2380,etcd2=http://etcd2:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd1:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd1:2380
    volumes:
      - etcd1_data:/etcd_data
    healthcheck:
      test: [ "CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    depends_on:
      nginx:
        condition: service_started
    restart: always
    networks:
      - etcd_network

  # etcd replica 3
  etcd2:
    build:
      context: .
      dockerfile: .devcontainer/etcd.Dockerfile
