global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'milvus'
    static_configs:
      - targets: ['milvus_proxy1:9091', 'milvus_proxy2:9091']
    metrics_path: /metrics
  - job_name: 'etcd'
    static_configs:
      - targets: ['etcd0:2379', 'etcd1:2379', 'etcd2:2379']
    metrics_path: /metrics
  - job_name: 'minio'
    static_configs:
      - targets: ['minio0:9000', 'minio1:9000', 'minio2:9000', 'minio3:9000']
    metrics_path: /minio/v2/metrics/cluster
  - job_name: 'pulsar'
    static_configs:
      - targets: ['pulsar:8080']
    metrics_path: /metrics

# Purpose:
# - Configures Prometheus to scrape metrics from Milvus, etcd, and MinIO.
# - Sets a 15-second scrape interval for near-real-time monitoring.
# - Targets Milvus metrics endpoint (9091), etcd (2379), and MinIO (9000).
# - Ensures comprehensive observability for performance and health.
