    # Load balancer for Milvus gRPC
    upstream milvus_grpc {
        server milvus_proxy1:19530 max_fails=3 fail_timeout=5s;
        server milvus_proxy2:19530 max_fails=3 fail_timeout=5s;
    }

    server {
        listen 19530 http2;
        location / {
            grpc_pass grpc://milvus_grpc;
            grpc_connect_timeout 5s;
        }
    }

    # Load balancer for Milvus Query Node 1 & 2
    upstream milvus_query {
