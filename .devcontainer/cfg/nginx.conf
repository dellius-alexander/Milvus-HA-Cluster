            proxy_send_timeout 10s;
        }
    }

    # Load balancer for Milvus Data Node 1 & 2
    upstream milvus_data {
        server milvus_datanode1:21124 max_fails=3 fail_timeout=5s;
        server milvus_datanode2:21124 max_fails=3 fail_timeout=5s;
