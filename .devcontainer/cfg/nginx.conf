        }
    }

    # Load balancer for Milvus Index Node 1 & 2
    upstream milvus_index {
        server milvus_indexnode1:21125 max_fails=3 fail_timeout=5s;
        server milvus_indexnode2:21125 max_fails=3 fail_timeout=5s;
    }

    server {
        listen 21125;
        location / {
            proxy_pass http://milvus_index;
