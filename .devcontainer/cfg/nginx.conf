# Automatically adjusts the number of worker processes
# based on the CPU cores available on the Docker host,
# optimizing resource usage.
worker_processes auto;

events {
    # Allows each worker to handle up to 1024 simultaneous
    # connections, suitable for moderate traffic (adjustable
    # based on load)
    worker_connections 1024;
}

# The 'http' block contains directives for handling HTTP traffic.
http {
    # Formatting the access logs, including remote address, user, time,
    # request, status, bytes sent, referer, user agent, and forwarded for
    # information.
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Logs to /dev/stdout and /dev/stderr for Docker to capture, viewable
    # with docker logs.
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # Logs to files for persistent storage on docker host.
    #ccess_log /var/log/nginx/access.log main;
    #error_log /var/log/nginx/error.log warn;

    # Timeout settings
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;

    # Buffer size settings
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # WebSocket connection upgrade mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Health check server block
    server {
        listen 8001;
        #server_name localhost;

        location /healthz {
            access_log off;
            add_header 'Content-Type' 'application/json';
            return 200 '{"status": "OK"}\n';

        }
    }

    # Load balancer for etcd cluster
    upstream etcd_cluster {
        server etcd0:2379 max_fails=3 fail_timeout=5s;
        server etcd1:2379 max_fails=3 fail_timeout=5s;
        server etcd2:2379 max_fails=3 fail_timeout=5s;
    }

    server {
        # Listens on port 2379 for HTTP traffic, the standard default port for
        # etcd server API.
        listen 2379;

        location / {
            proxy_pass http://etcd_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "keep-alive";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }
    }

    # Load balancer for minio clusster
    upstream minio_cluster {
        server minio0:9000 max_fails=3 fail_timeout=5s;
        server minio1:9000 max_fails=3 fail_timeout=5s;
        server minio2:9000 max_fails=3 fail_timeout=5s;
        server minio3:9000 max_fails=3 fail_timeout=5s;
    }

    server {
        # Listens on port 9000 for HTTP traffic, the standard default port for
        # MinIO server API.
        listen 9000;

        location / {
            proxy_pass http://minio_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "keep-alive";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }
    }

   # Load balancer for Milvus REST API
    upstream milvus_rest {
