# haproxy.cfg
# This file configures HAProxy to direct database traffic.
# It's like a traffic cop sending cars to the right roads.

# Global settings for HAProxy
global
    # Send logs to Docker
    log stdout format raw local0 info
    # Allow up to 4096 connections
    maxconn 4096
    # Store the process ID
    pidfile /var/run/haproxy.pid
    # Run as the haproxy user for security
    user haproxy
    group haproxy
    # Run in the background
    daemon
    # Enable a management socket
    stats socket /var/run/haproxy.sock user haproxy group haproxy mode 660 level admin
    stats timeout 2m

# Default settings for all sections
defaults
    log global
    mode tcp # Use TCP for PostgreSQL
    balance roundrobin # Distribute traffic evenly
    maxconn 1000
    timeout client 50s
    timeout connect 5s
    timeout server 50s
    timeout queue 5s
    option tcplog
    option log-health-checks

# Stats page for monitoring
frontend stats
    mode http
    bind *:8080
    stats enable
    stats uri /stats
    stats refresh 30s
    option httplog
    stats show-node
    stats show-legends
    stats show-desc "PostgreSQL Cluster HAProxy Stats"
    stats auth admin:admin123

# Frontend for write queries (to master)
frontend frontend_postgres_write
    mode tcp
    bind *:5432
    default_backend backend_postgres_write
    option tcplog

# Backend for write queries (master only)
backend backend_postgres_write
    mode tcp
    option pgsql-check user repl expected=primary
    server postgres-master postgres-master:5432 check

# Frontend for read queries (to replicas)
frontend frontend_postgres_read
    mode tcp
    bind *:5433
    default_backend backend_postgres_read
    option tcplog

# Backend for read queries (replicas only)
backend backend_postgres_read
    mode tcp
    option pgsql-check user repl expected=replica
    server postgres-replica1 postgres-replica1:5432 check
    server postgres-replica2 postgres-replica2:5432 check
    server postgres-replica3 postgres-replica3:5432 check
