global
    stats socket /var/run/api.sock user haproxy group haproxy mode 660 level admin expose-fd listeners
    maxconn 4096
    daemon
    log stdout format raw local0 info

defaults
    timeout client 30s
    timeout connect 10s
    retries 3
    timeout server 30s
    timeout queue 10s
    log global
    mode tcp
    balance roundrobin
    maxconn 2000
    option tcplog
    option dontlognull

frontend pulsar_frontend
    bind *:6650
    mode tcp
    option tcplog
    default_backend pulsar_backend

backend pulsar_backend
    mode tcp
    balance roundrobin
    option tcp-check
    # Increase check interval and timeout for slower broker startup
    server broker1 broker1:6650 check port 8080 inter 5000 rise 2 fall 3
    server broker2 broker2:6650 check port 8080 inter 5000 rise 2 fall 3
    server broker3 broker3:6650 check port 8080 inter 5000 rise 2 fall 3

frontend http_frontend
    bind *:8080
    mode http
    option httplog
    default_backend http_backend

backend http_backend
    mode http
    balance roundrobin
    option httpchk GET /admin/v2/brokers/health
    # Increase check interval and timeout
    server broker1 broker1:8080 check inter 5000 rise 2 fall 3
    server broker2 broker2:8080 check inter 5000 rise 2 fall 3
    server broker3 broker3:8080 check inter 5000 rise 2 fall 3
